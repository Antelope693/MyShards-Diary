services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diary-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    environment:
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - TZ=${TZ:-Asia/Shanghai}
    restart: unless-stopped
    networks:
      - diary-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=/api
    container_name: diary-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - SERVER_DOMAIN=${SERVER_DOMAIN:-localhost}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - diary-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  diary-network:
    driver: bridge

